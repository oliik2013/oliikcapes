name: Release Fabric

on: push

    

jobs:
  releaseFabric:

    runs-on: windows-latest

    

    steps:
      - name: hello
        uses: actions/checkout@v4

    
      - name: validate gradle wrapper
        uses: gradle/actions/wrapper-validation@v4

    
      - name: setup jdk
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'zulu'
    
      
      - run: ./gradlew :fabric:build

      - run: dir

      - name: hi
        uses: actions/upload-artifact@v4
        with:
           name: my-artifact
           path: build/libs/
           
