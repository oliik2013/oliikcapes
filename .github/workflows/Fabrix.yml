name: Release Fabric

on: workflow_dispatch
    

jobs:
  releaseFabric:

    runs-on: ubuntu-latest

    container:
      image: openjdk:21-jdk
      options: --user root

    steps:
      - uses: actions/checkout@v4
      - run: |
          chmod +x ./gradlew
          ./gradlew :fabric:build --stacktrace

      - name: hi
        uses: actions/upload-artifact@v4
        with:
           name: my-artifact
           path: build/libs/*.jar
           retention-days: 365
