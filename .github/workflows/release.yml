name: Release

on: push

jobs:
  release:

    runs-on: ubuntu-latest

    container:
      image: openjdk:17-jdk
      options: --user root

    steps:
      - uses: actions/checkout@v4
      - run: |
          chmod +x ./gradlew
          ./gradlew build 

      - name: hi
        uses: actions/upload-artifact@v4
        with:
           name: my-artifact
           path: build/libs/
